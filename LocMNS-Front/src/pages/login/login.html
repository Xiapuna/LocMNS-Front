<div class="page fade-in login-page">
  <div class="login-card">
    <h1 class="login-title">Connexion</h1>

    <form [formGroup]="formulaire" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Adresse mail</label>
        <input type="email" id="email" placeholder="Votre adresse mail" formControlName="email" />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          placeholder="Votre mot de passe"
          formControlName="password"
        />
      </div>

      <button type="submit" class="btn primary login-btn">Connexion</button>

      <div class="login-links">
        <a href="#">Mot de passe oublié</a>
        <p>Pas encore de compte ? <a href="#">S’inscrire</a></p>
      </div>
    </form>
  </div>
</div>
