<div class="page">
  <header class="header">
    <img src="assets/icons/menu.svg" alt="menu" class="icon-btn" />
    <h1 class="header-title">Réservation LocMNS</h1>
    <img src="assets/icons/user.svg" alt="profil" class="icon-btn" />
  </header>

  <div class="section-header">
    <h2 class="title">Liste des équipements</h2>

    <div class="actions">
      <button class="icon-btn">
        <img src="assets/icons/search.svg" alt="search" />
      </button>
      <button class="icon-btn">
        <img src="assets/icons/filter.svg" alt="filter" />
      </button>
    </div>
  </div>

  <div class="equipments-list fade-in">
    @for (equipment of equipments(); track equipment.id) {
      <div class="equipment-card">
        <div class="equipment-info">
          <img src="assets/icons/laptop.svg" class="equip-icon" />
          <div class="equipment-text">
            <span class="equip-name">{{ equipment.name }}</span>
            <span class="equip-location">{{ equipment.location.name }}</span>
          </div>
        </div>

        <div class="equipment-actions">
          <button class="btn secondary" [routerLink]="['/equipment-info/', equipment.id]">
            Plus d’info
          </button>
          <button class="btn primary" (click)="goToBooking(equipment.id)">Réserver</button>
        </div>
      </div>
    }
  </div>
</div>
