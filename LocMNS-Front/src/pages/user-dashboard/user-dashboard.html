<div class="page">
  <header class="header">
    <button class="icon-btn">
      <span class="material-icons">arrow_back</span>
    </button>

    <h1 class="header-title">Mes réservations</h1>

    <button class="icon-btn">
      <span class="material-icons">account_circle</span>
    </button>
  </header>

  <section class="reservations-list fade-in">
    @if (visibleLoans().length === 0) {
      <p>Aucune réservation.</p>
    } @else {
      @for (loan of visibleLoans(); track loan.id) {
        <div class="reservation-card">
          <div class="reservation-info">
            <img class="equip-icon" src="assets/icons/laptop.svg" alt="icon" />
            <div class="reservation-text">
              <h3 class="reservation-title">{{ loan.equipment.name }}</h3>
              <p class="reservation-dates">
                Du {{ loan.startDate | date: 'dd/MM/yyyy' }} au
                {{ loan.endDate | date: 'dd/MM/yyyy' }}
              </p>
            </div>
          </div>
          <button class="btn secondary" [routerLink]="['/equipment-info/', loan.equipment.id]">
            Voir
          </button>
        </div>
      }
    }
  </section>

  @if (userId) {
    <button class="btn primary" [routerLink]="['/user-reservations']">
      Voir toutes mes réservations
    </button>
  }
</div>
