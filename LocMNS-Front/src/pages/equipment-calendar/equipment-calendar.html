<div class="calendar-card fade-in">
  <!-- Header -->
  <div class="calendar-header">
    <button class="btn ghost small" (click)="prevMonth()">←</button>

    <h2>{{ currentDate() | date: 'MMMM yyyy' }}</h2>

    <button class="btn ghost small" (click)="nextMonth()">→</button>
  </div>

  <!-- Weekdays -->
  <div class="calendar-weekdays">
    <div>Lun</div>
    <div>Mar</div>
    <div>Mer</div>
    <div>Jeu</div>
    <div>Ven</div>
    <div>Sam</div>
    <div>Dim</div>
  </div>

  <!-- Days -->
  <div class="calendar-weeks">
    @for (week of weeks; track $index) {
      <div class="calendar-week">
        @for (day of week; track $index) {
          <div
            class="calendar-day"
            [class.other-month]="day.date.getMonth() !== currentDate().getMonth()"
            [class.reserved]="day.reserved"
            [class.available]="!day.reserved"
            [class.selected]="isSelected(day.date)"
            [class.past]="isPast(day.date)"
          >
            {{ day.date.getDate() }}
          </div>
        }
      </div>
    }
  </div>
</div>
