<div class="page fade-in">
  <section class="request-card">
    <h2>Historique de réservation</h2>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Statut</th>
        </tr>
      </thead>

      <tbody>
        @for (h of admin.loanHistory(); track h.dateChangement) {
          <tr>
            <td>{{ h.dateChangement | date: 'dd/MM/yyyy' }}</td>
            <td>{{ h.loanState }}</td>
          </tr>
        }
      </tbody>
    </table>
  </section>
</div>
